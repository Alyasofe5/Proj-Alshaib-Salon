<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- MOBILE FIX: viewport-fit=cover enables edge-to-edge on iPhone notch/Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- MOBILE FIX: PWA/home-screen app capability meta tags for iOS & Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="الحسّون" />
    <meta name="theme-color" content="#0a1f14" />

    <!-- SEO -->
    <meta name="description" content="محامص ومطاحن الحسّون — أجود أنواع القهوة المختصة، المكسرات الفاخرة، والبهارات الأصيلة. توصيل سريع وأسعار تنافسية." />
    <meta name="robots" content="index, follow" />

    <title>محامص ومطاحن الحسّون | AL Hason Roastery</title>

    <!-- Preconnect to external origins to reduce DNS/TCP latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <!-- Google Fonts — display=swap prevents render blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />

    <!-- FontAwesome — load async to avoid render blocking -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" /></noscript>

    <!-- SweetAlert2 — defer so it doesn't block parsing -->
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- MOBILE FIX: Prevent iOS callout on long press & double-tap zoom on elements -->
    <style>
      html { touch-action: manipulation; }
      /* Prevent layout shift before fonts load */
      body { font-family: Cairo, system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src-react/main.jsx"></script>
  </body>
</html>
